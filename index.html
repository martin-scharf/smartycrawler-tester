<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartyCrawler Tester</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-size: 14px; }
    .status-pending  { color: #6b7280; }
    .status-running  { color: #2563eb; }
    .status-done     { color: #16a34a; }
    .status-error    { color: #dc2626; }
    .spin { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    table { border-collapse: collapse; }
    .thumb { width: 80px; height: auto; cursor: pointer; border-radius: 4px; border: 1px solid #e5e7eb; transition: opacity 0.2s; }
    .thumb:hover { opacity: 0.8; }
    /* Modal */
    #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 999; align-items: center; justify-content: center; }
    #modal.open { display: flex; }
    #modal img { max-width: 90vw; max-height: 90vh; border-radius: 8px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Modal für Screenshot-Vollansicht -->
  <div id="modal" onclick="closeModal()">
    <img id="modal-img" src="" alt="Screenshot" />
  </div>

  <div class="max-w-7xl mx-auto px-4 py-8">

    <!-- Header -->
    <div class="mb-8">
      <div class="flex items-center gap-3 mb-1">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">SmartyCrawler Tester</h1>
      </div>
      <p class="text-gray-500 text-sm ml-11">Stakis Preis – Artikelnummern abfragen</p>
    </div>

    <!-- Input -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Artikelnummern <span class="text-gray-400 font-normal">(eine pro Zeile)</span>
      </label>
      <textarea
        id="artikel-input"
        rows="5"
        placeholder="OC47&#10;F026407&#10;1457434310"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-y"
      ></textarea>
      <div class="flex items-center gap-4 mt-4">
        <button
          id="start-btn"
          onclick="startAbfragen()"
          class="bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-medium px-5 py-2 rounded-lg text-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Abfragen starten
        </button>
        <button
          id="clear-btn"
          onclick="clearResults()"
          class="text-gray-500 hover:text-gray-700 text-sm px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors"
        >
          Zurücksetzen
        </button>
        <span id="progress-text" class="text-sm text-gray-500 ml-auto"></span>
      </div>
    </div>

    <!-- Ergebnis-Tabelle -->
    <div id="results-container" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
        <h2 class="font-semibold text-gray-800">Ergebnisse</h2>
        <span id="result-count" class="text-sm text-gray-500"></span>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-200">
              <th class="text-left px-4 py-3 font-medium text-gray-600 w-10">#</th>
              <th class="text-left px-4 py-3 font-medium text-gray-600">Suchnummer</th>
              <th class="text-left px-4 py-3 font-medium text-gray-600">Hersteller</th>
              <th class="text-left px-4 py-3 font-medium text-gray-600">Artikelnummer</th>
              <th class="text-right px-4 py-3 font-medium text-gray-600">EK</th>
              <th class="text-right px-4 py-3 font-medium text-gray-600">VK</th>
              <th class="text-left px-4 py-3 font-medium text-gray-600">Lieferzeit</th>
              <th class="text-center px-4 py-3 font-medium text-gray-600">Screenshot</th>
            </tr>
          </thead>
          <tbody id="result-tbody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    const API_BASE     = 'https://smartycrawler.vercel.app';
    const API_KEY      = 'smartycrawler-api-secret-2024';
    const SKILL        = 'stakis-preis';
    const CUSTOMER_ID  = 'cmp02d88g000004l10ihhyffv';
    const POLL_MS      = 3000;

    let jobs = {};          // runId → { artikel, rowGroupStart }
    let pollIntervals = {}; // runId → intervalId
    let totalJobs = 0;
    let doneJobs  = 0;
    let globalRowIndex = 0; // laufende Zeilennummer (je Suchnummer)

    // ── Hilfsfunktionen ──────────────────────────────────────────────────────

    function setBtn(loading) {
      const btn = document.getElementById('start-btn');
      btn.disabled = loading;
      btn.textContent = loading ? 'Läuft…' : 'Abfragen starten';
    }

    function updateProgress() {
      document.getElementById('progress-text').textContent =
        totalJobs > 0 ? `${doneJobs} / ${totalJobs} fertig` : '';
    }

    function openModal(src) {
      document.getElementById('modal-img').src = src;
      document.getElementById('modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
    }

    function clearResults() {
      document.getElementById('result-tbody').innerHTML = '';
      document.getElementById('results-container').classList.add('hidden');
      document.getElementById('result-count').textContent = '';
      document.getElementById('progress-text').textContent = '';
      Object.values(pollIntervals).forEach(clearInterval);
      pollIntervals = {};
      jobs = {};
      totalJobs = 0;
      doneJobs  = 0;
      globalRowIndex = 0;
      setBtn(false);
    }

    // ── Zeilen in Tabelle ────────────────────────────────────────────────────

    function addPendingRow(artikel, idx) {
      const tbody = document.getElementById('result-tbody');
      const tr = document.createElement('tr');
      tr.id = `row-pending-${idx}`;
      tr.className = 'border-b border-gray-100';
      tr.innerHTML = `
        <td class="px-4 py-3 text-gray-400">${idx}</td>
        <td class="px-4 py-3 font-mono text-gray-700">${escHtml(artikel)}</td>
        <td colspan="5" class="px-4 py-3 text-gray-400 status-running">
          <span class="spin">⟳</span> wird abgefragt…
        </td>
        <td class="px-4 py-3"></td>
      `;
      tbody.appendChild(tr);
    }

    function replacePendingRow(artikel, idx, treffer, screenshotUrl) {
      // Platzhalter-Zeile entfernen
      const placeholder = document.getElementById(`row-pending-${idx}`);
      if (placeholder) placeholder.remove();

      const tbody = document.getElementById('result-tbody');

      if (!treffer || treffer.length === 0) {
        const tr = document.createElement('tr');
        tr.className = 'border-b border-gray-100';
        tr.innerHTML = `
          <td class="px-4 py-3 text-gray-500">${idx}</td>
          <td class="px-4 py-3 font-mono text-gray-700">${escHtml(artikel)}</td>
          <td colspan="5" class="px-4 py-3 text-gray-400 italic">Keine Treffer</td>
          <td class="px-4 py-3 text-center">
            ${screenshotUrl ? screenshotThumb(screenshotUrl) : ''}
          </td>
        `;
        tbody.appendChild(tr);
        return;
      }

      treffer.forEach((t, i) => {
        const tr = document.createElement('tr');
        tr.className = 'border-b border-gray-100 hover:bg-gray-50';

        const isFirst = i === 0;
        const imgHtml = isFirst && screenshotUrl ? screenshotThumb(screenshotUrl) : '';

        tr.innerHTML = `
          <td class="px-4 py-3 text-gray-500">${isFirst ? idx : ''}</td>
          <td class="px-4 py-3 font-mono text-gray-700">${isFirst ? escHtml(artikel) : ''}</td>
          <td class="px-4 py-3 font-medium text-gray-800">${escHtml(t.hersteller || '')}</td>
          <td class="px-4 py-3 font-mono text-gray-600">${escHtml(t.artNr || '')}</td>
          <td class="px-4 py-3 text-right text-gray-800">${escHtml(t.ek || '')}</td>
          <td class="px-4 py-3 text-right font-medium text-green-700">${escHtml(t.vk || '')}</td>
          <td class="px-4 py-3 text-gray-600">${escHtml(t.lieferzeit || '')}</td>
          <td class="px-4 py-3 text-center">${imgHtml}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function replaceWithError(artikel, idx, msg) {
      const placeholder = document.getElementById(`row-pending-${idx}`);
      if (placeholder) placeholder.remove();

      const tbody = document.getElementById('result-tbody');
      const tr = document.createElement('tr');
      tr.className = 'border-b border-gray-100';
      tr.innerHTML = `
        <td class="px-4 py-3 text-gray-500">${idx}</td>
        <td class="px-4 py-3 font-mono text-gray-700">${escHtml(artikel)}</td>
        <td colspan="6" class="px-4 py-3 text-red-500 italic">${escHtml(msg)}</td>
      `;
      tbody.appendChild(tr);
    }

    function screenshotThumb(screenshotUrl) {
      const fullUrl = `${API_BASE}${screenshotUrl}`;
      return `<img
        class="thumb"
        src="${fullUrl}"
        alt="Screenshot"
        onclick="openModal('${fullUrl}')"
        title="Screenshot anzeigen"
      />`;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── API-Aufrufe ──────────────────────────────────────────────────────────

    async function createJob(artikel) {
      const res = await fetch(`${API_BASE}/api/jobs/run`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${API_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          skillSlug: SKILL,
          customerId: CUSTOMER_ID,
          params: { artikel }
        })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json(); // { run_id, status }
    }

    async function pollJob(runId) {
      const res = await fetch(`${API_BASE}/api/jobs/${runId}`, {
        headers: { 'Authorization': `Bearer ${API_KEY}` }
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      return {
        status:        data.status,
        screenshotUrl: data.screenshotUrl,
        treffer:       data.result?.treffer || [],
        artikel:       data.result?.artikel || ''
      };
    }

    // ── Hauptlogik ───────────────────────────────────────────────────────────

    async function startAbfragen() {
      const raw = document.getElementById('artikel-input').value.trim();
      if (!raw) return;

      const artikels = raw.split('\n').map(s => s.trim()).filter(Boolean);
      if (artikels.length === 0) return;

      clearResults();

      totalJobs = artikels.length;
      doneJobs  = 0;
      updateProgress();
      setBtn(true);

      document.getElementById('results-container').classList.remove('hidden');
      updateResultCount();

      // Alle Jobs parallel starten
      artikels.forEach(async (artikel, i) => {
        const idx = i + 1;
        addPendingRow(artikel, idx);

        let runId;
        try {
          const job = await createJob(artikel);
          runId = job.run_id;
        } catch (err) {
          replaceWithError(artikel, idx, `Job-Erstellung fehlgeschlagen: ${err.message}`);
          doneJobs++;
          updateProgress();
          checkAllDone();
          return;
        }

        // Polling starten
        const iv = setInterval(async () => {
          try {
            const result = await pollJob(runId);

            if (result.status === 'done') {
              clearInterval(iv);
              delete pollIntervals[runId];
              replacePendingRow(artikel, idx, result.treffer, result.screenshotUrl);
              doneJobs++;
              updateProgress();
              updateResultCount();
              checkAllDone();
            } else if (result.status === 'error' || result.status === 'failed') {
              clearInterval(iv);
              delete pollIntervals[runId];
              replaceWithError(artikel, idx, `Job fehlgeschlagen (Status: ${result.status})`);
              doneJobs++;
              updateProgress();
              checkAllDone();
            }
            // pending/running → weiter pollen
          } catch (err) {
            clearInterval(iv);
            delete pollIntervals[runId];
            replaceWithError(artikel, idx, `Polling-Fehler: ${err.message}`);
            doneJobs++;
            updateProgress();
            checkAllDone();
          }
        }, POLL_MS);

        pollIntervals[runId] = iv;
      });
    }

    function checkAllDone() {
      if (doneJobs >= totalJobs) {
        setBtn(false);
      }
    }

    function updateResultCount() {
      const rows = document.querySelectorAll('#result-tbody tr').length;
      document.getElementById('result-count').textContent =
        rows > 0 ? `${rows} Zeile${rows !== 1 ? 'n' : ''}` : '';
    }
  </script>

</body>
</html>
